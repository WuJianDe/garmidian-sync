name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compile Python files
        run: |
          python -m py_compile \
            src/garmin_obsidian_sync/__init__.py \
            src/garmin_obsidian_sync/config.py \
            src/garmin_obsidian_sync/garmindb_wrapper.py \
            src/garmin_obsidian_sync/exporter.py \
            src/garmin_obsidian_sync/cli.py

      - name: Verify CLI help
        run: garmin-obsidian-sync --help
